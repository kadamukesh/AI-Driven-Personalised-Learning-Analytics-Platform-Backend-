spring:
  application:
    name: adpl

  datasource:
    url: jdbc:postgresql://localhost:5432/capstone_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: never
      continue-on-error: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0YXV0aGVudGljYXRpb25wcm9qZWN0MjAyNA==
    expiration: 86400000  # 24 hours in milliseconds
    refresh-expiration: 604800000  # 7 days in milliseconds

logging:
  level:
    com.capstone.adpl: DEBUG
    org.springframework.security: INFO
    
google:
  client-id: 250907932405-gp1s5q8jqssd06ka7icld49ujivfmt76.apps.googleusercontent.com
